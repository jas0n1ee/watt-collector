<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>家庭电表功率监控</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }
        
        header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }
        
        header p {
            opacity: 0.9;
            font-size: 1.1rem;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: white;
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            text-align: center;
            transition: transform 0.3s ease;
        }
        
        .stat-card:hover {
            transform: translateY(-5px);
        }
        
        .stat-card .value {
            font-size: 2.5rem;
            font-weight: 700;
            color: #667eea;
            margin: 10px 0;
        }
        
        .stat-card .label {
            color: #666;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .stat-card .unit {
            font-size: 0.9rem;
            color: #999;
        }
        
        .chart-container {
            background: white;
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }
        
        .chart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 10px;
        }
        
        .chart-title {
            font-size: 1.3rem;
            font-weight: 600;
            color: #333;
        }
        
        .controls {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        
        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.3s ease;
            background: #f0f0f0;
            color: #333;
        }
        
        .btn:hover {
            background: #e0e0e0;
        }
        
        .btn.active {
            background: #667eea;
            color: white;
        }
        
        .btn-refresh {
            background: #48bb78;
            color: white;
        }
        
        .btn-refresh:hover {
            background: #38a169;
        }
        
        .chart-wrapper {
            position: relative;
            height: 400px;
        }
        
        .info-box {
            background: #f7fafc;
            border-left: 4px solid #667eea;
            padding: 16px 20px;
            border-radius: 0 8px 8px 0;
            margin-top: 20px;
        }
        
        .info-box h4 {
            color: #333;
            margin-bottom: 8px;
        }
        
        .info-box p {
            color: #666;
            font-size: 0.9rem;
            line-height: 1.6;
        }
        
        .info-box code {
            background: #e2e8f0;
            padding: 2px 6px;
            border-radius: 4px;
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 0.85rem;
        }
        
        .loading {
            text-align: center;
            padding: 60px;
            color: #999;
        }
        
        .loading::after {
            content: '';
            display: inline-block;
            width: 24px;
            height: 24px;
            border: 3px solid #667eea;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-left: 10px;
            vertical-align: middle;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .error {
            background: #fed7d7;
            color: #c53030;
            padding: 16px 20px;
            border-radius: 8px;
            margin: 20px 0;
        }
        
        footer {
            text-align: center;
            color: white;
            opacity: 0.8;
            margin-top: 30px;
            font-size: 0.9rem;
        }
        
        @media (max-width: 768px) {
            header h1 {
                font-size: 1.8rem;
            }
            
            .stat-card .value {
                font-size: 2rem;
            }
            
            .chart-wrapper {
                height: 300px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>⚡ 家庭电表功率监控</h1>
            <p>实时追踪用电功率，优化能源使用</p>
        </header>
        
        <div id="error-container"></div>
        
        <div class="stats-grid" id="stats-container">
            <div class="stat-card">
                <div class="label">当前功率</div>
                <div class="value" id="current-power">--</div>
                <div class="unit">kW</div>
            </div>
            <div class="stat-card">
                <div class="label">平均功率</div>
                <div class="value" id="avg-power">--</div>
                <div class="unit">kW</div>
            </div>
            <div class="stat-card">
                <div class="label">最大功率</div>
                <div class="value" id="max-power">--</div>
                <div class="unit">kW</div>
            </div>
            <div class="stat-card">
                <div class="label">累计用电</div>
                <div class="value" id="total-energy">--</div>
                <div class="unit">kWh</div>
            </div>
        </div>
        
        <div class="chart-container">
            <div class="chart-header">
                <div class="chart-title">功率趋势图</div>
                <div class="controls">
                    <button class="btn" data-days="1">1天</button>
                    <button class="btn active" data-days="2">2天</button>
                    <button class="btn" data-days="7">7天</button>
                    <button class="btn" data-days="30">30天</button>
                    <button class="btn btn-refresh" onclick="refreshData()">🔄 刷新</button>
                </div>
            </div>
            <div class="chart-wrapper">
                <canvas id="powerChart"></canvas>
            </div>
            <div class="info-box">
                <h4>📊 关于功率计算</h4>
                <p>
                    功率是通过电量的差分计算得出的：<code>功率 = Δ电量 / Δ时间</code>。
                    为避免因网络重试导致的异常峰值，只有当电量变化超过 <code>0.1 kWh</code> 时才计算功率。
                    这样可以确保数据的准确性和可靠性。
                </p>
            </div>
        </div>
        
        <footer>
            <p>电表数据采集与可视化系统 | 使用 Flask + Chart.js 构建</p>
        </footer>
    </div>

    <script>
        let chart = null;
        let currentDays = 2;
        
        // 初始化图表
        function initChart() {
            const ctx = document.getElementById('powerChart').getContext('2d');
            
            chart = new Chart(ctx, {
                type: 'line',
                data: {
                    datasets: [{
                        label: '功率 (kW)',
                        data: [],
                        borderColor: '#667eea',
                        backgroundColor: 'rgba(102, 126, 234, 0.1)',
                        borderWidth: 2,
                        fill: true,
                        tension: 0.4,
                        pointRadius: 3,
                        pointHoverRadius: 6,
                        pointBackgroundColor: '#667eea',
                        pointBorderColor: '#fff',
                        pointBorderWidth: 2
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    interaction: {
                        mode: 'index',
                        intersect: false
                    },
                    plugins: {
                        legend: {
                            display: true,
                            position: 'top'
                        },
                        tooltip: {
                            backgroundColor: 'rgba(0, 0, 0, 0.8)',
                            padding: 12,
                            cornerRadius: 8,
                            callbacks: {
                                title: function(context) {
                                    const date = new Date(context[0].parsed.x);
                                    return date.toLocaleString('zh-CN');
                                },
                                label: function(context) {
                                    return `功率: ${context.parsed.y.toFixed(2)} kW`;
                                },
                                afterLabel: function(context) {
                                    const data = context.raw;
                                    if (data && data.energy_delta && data.time_delta) {
                                        return [
                                            `电量变化: ${data.energy_delta.toFixed(2)} kWh`,
                                            `时间间隔: ${data.time_delta.toFixed(1)} 分钟`
                                        ];
                                    }
                                    return [];
                                }
                            }
                        }
                    },
                    scales: {
                        x: {
                            type: 'time',
                            time: {
                                displayFormats: {
                                    hour: 'MM-dd HH:mm',
                                    day: 'MM-dd',
                                    minute: 'HH:mm'
                                }
                            },
                            title: {
                                display: true,
                                text: '时间'
                            },
                            grid: {
                                color: 'rgba(0, 0, 0, 0.05)'
                            }
                        },
                        y: {
                            title: {
                                display: true,
                                text: '功率 (kW)'
                            },
                            grid: {
                                color: 'rgba(0, 0, 0, 0.05)'
                            },
                            beginAtZero: true
                        }
                    }
                }
            });
        }
        
        // 加载功率数据
        async function loadPowerData(days) {
            try {
                const response = await fetch(`/api/power?days=${days}`);
                const result = await response.json();
                
                if (!result.success) {
                    throw new Error(result.error || '加载数据失败');
                }
                
                return result.data;
            } catch (error) {
                showError('加载功率数据失败: ' + error.message);
                return [];
            }
        }
        
        // 加载统计数据
        async function loadStatistics(days) {
            try {
                const response = await fetch(`/api/statistics?days=${days}`);
                const result = await response.json();
                
                if (!result.success) {
                    throw new Error(result.error || '加载统计数据失败');
                }
                
                return result.statistics;
            } catch (error) {
                console.error('加载统计数据失败:', error);
                return null;
            }
        }
        
        // 更新统计卡片
        function updateStats(stats) {
            if (!stats || stats.total_points === 0) {
                document.getElementById('current-power').textContent = '--';
                document.getElementById('avg-power').textContent = '--';
                document.getElementById('max-power').textContent = '--';
                document.getElementById('total-energy').textContent = '--';
                return;
            }
            
            document.getElementById('avg-power').textContent = stats.avg_power_kw.toFixed(2);
            document.getElementById('max-power').textContent = stats.max_power_kw.toFixed(2);
            document.getElementById('total-energy').textContent = stats.total_energy_delta.toFixed(2);
        }
        
        // 更新当前功率（使用最新数据点）
        function updateCurrentPower(data) {
            if (data && data.length > 0) {
                const latest = data[data.length - 1];
                document.getElementById('current-power').textContent = latest.power_kw.toFixed(2);
            } else {
                document.getElementById('current-power').textContent = '--';
            }
        }
        
        // 更新图表
        function updateChart(data) {
            if (!chart) return;
            
            const chartData = data.map(item => ({
                x: new Date(item.timestamp).getTime(),
                y: item.power_kw,
                energy_delta: item.energy_delta,
                time_delta: item.time_delta_minutes
            }));
            
            chart.data.datasets[0].data = chartData;
            chart.update('none'); // 使用 'none' 模式避免动画，提高性能
        }
        
        // 显示错误信息
        function showError(message) {
            const container = document.getElementById('error-container');
            container.innerHTML = `<div class="error">${message}</div>`;
            setTimeout(() => {
                container.innerHTML = '';
            }, 5000);
        }
        
        // 刷新数据
        async function refreshData() {
            // 显示加载状态
            document.getElementById('powerChart').style.opacity = '0.5';
            
            // 并行加载数据和统计
            const [powerData, stats] = await Promise.all([
                loadPowerData(currentDays),
                loadStatistics(currentDays)
            ]);
            
            // 更新 UI
            updateChart(powerData);
            updateStats(stats);
            updateCurrentPower(powerData);
            
            // 恢复透明度
            document.getElementById('powerChart').style.opacity = '1';
        }
        
        // 设置事件监听器
        function setupEventListeners() {
            // 时间范围按钮
            document.querySelectorAll('.btn[data-days]').forEach(btn => {
                btn.addEventListener('click', function() {
                    // 更新按钮状态
                    document.querySelectorAll('.btn[data-days]').forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                    
                    // 更新当前天数并刷新
                    currentDays = parseInt(this.dataset.days);
                    refreshData();
                });
            });
        }
        
        // 初始化
        async function init() {
            initChart();
            setupEventListeners();
            await refreshData();
            
            // 自动刷新（每 60 秒）
            setInterval(refreshData, 60000);
        }
        
        // 页面加载完成后初始化
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
